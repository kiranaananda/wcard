<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Save the Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Crimson+Text&family=Quicksand:wght@300&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #273144;
            overflow: hidden;
            color: white;
            font-family: 'Crimson Text', serif;
        }

        /* 1. The Container */
        .wrapper {
            position: relative; 
            width: 100vw;
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* THE IPHONE 15 FIX: Dynamic Viewport Height */
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #273144;
        }

        /* 2. The Text Content Area */
        .content {
            position: relative;
            z-index: 10; 
            text-align: center;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3. Base Decoration Styles */
        .decor {
            position: absolute; 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
            z-index: 1; 
            width: clamp(150px, 25vw, 400px);
            height: clamp(150px, 25vw, 400px);
            pointer-events: none; /* Stops flowers from blocking text selection */
        }

        /* 4. Top Row */
        .top-left { 
            top: -5%; 
            left: -5%; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/left.png?raw=true');
            background-position: 70% 40%;
            background-size: 200%;
        }

        .top-center { 
            top: -2%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: clamp(200px, 40vw, 600px); 
            height: clamp(100px, 15vw, 250px);
            background-image: url();
            background-size: 150%;
        }

        .top-right { 
            top: -5%; 
            right: -5%; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/right.png?raw=true');
            transform: rotate(180deg);
            background-size: 200%;
            background-position: 60% 10%;
        }

        /* 5. Bottom Row */
        .bottom-left { 
            bottom: -5%; 
            left: -5%; 
            background-image: url();
            background-size: 200%;
            background-position: 60% 10%;
        }

        .bottom-center { 
            bottom: -2%; 
            left: 50%; 
            transform: translateX(-50%) rotate(180deg); 
            width: clamp(200px, 40vw, 600px);
            height: clamp(100px, 15vw, 250px);
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/middle.png?raw=true');
            background-size: 150%;
        }

        .bottom-right { 
            bottom: -5%; 
            right: -5%; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/left.png?raw=true');
            transform: rotate(180deg);
            background-position: 70% 40%;
            background-size: 200%;
        }

        /* --- Text Styling --- */
        #guest-salutation { font-size: clamp(1.2rem, 4vw, 1.8rem); margin-bottom: 10px; font-style: italic; }
        #main-title { font-family: 'Allura', cursive; font-size: clamp(3rem, 10vw, 5rem); margin: 0; }
        #date { font-family: 'Quicksand', sans-serif; font-size: clamp(1.5rem, 5vw, 2rem); letter-spacing: 5px; margin: 10px 0; }
        #body-text { font-size: clamp(0.9rem, 3vw, 1.2rem); max-width: 80%; line-height: 1.5; margin-bottom: 20px; }
        #couple-names { font-family: 'Allura', cursive; font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; }
        
        .gold-line {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="decor top-left"></div>
    <div class="decor top-center"></div>
    <div class="decor top-right"></div>
    <div class="decor bottom-left"></div>
    <div class="decor bottom-center"></div>
    <div class="decor bottom-right"></div>

    <main class="content">
        <div id="guest-salutation">Dear <span id="guest-name">Guest</span>,</div>
        <div class="gold-line"></div>
        <h1 id="main-title">Save The Date</h1>
        <p id="date">03.06.2026</p>
        <div class="gold-line"></div>
        <p id="body-text">We warmly invite you to share in the celebration of our marriage. Your presence on this joyous occasion will mean the world to us.</p>
        <h2 id="couple-names">Kirana & Andrzej</h2>
    </main>
</div>

<script>
    // Extract name from URL path
    const pathArray = window.location.pathname.split('/');
    const nameFromPath = pathArray[pathArray.length - 1] || pathArray[pathArray.length - 2];

    if (nameFromPath && nameFromPath.toLowerCase() !== 'wcard' && nameFromPath !== 'index.html') {
        document.getElementById('guest-name').innerText = decodeURIComponent(nameFromPath).replace(/[_-]/g, ' ');
    }
</script>

</body>
</html>
