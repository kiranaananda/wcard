<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Crimson+Text&family=Quicksand:wght@300&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #273144;
            overflow: hidden;
            color: white;
            font-family: 'Crimson Text', serif;
        }

        /* The 3x3 Grid */
        .wrapper {
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            grid-template-rows: 200px 1fr 200px;
            height: 100vh;
            width: 100vw;
        }

        /* --- Corner & Edge Elements --- */
 /* 1. The Container */
.wrapper {
    position: relative; /* This is the anchor for absolute positioning */
    width: 100vw;
    height: 100vh;
    overflow: hidden; /* Prevents scrollbars from overlapping images */
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #273144;
}

/* 2. The Text Content Area */
.content {
    position: relative;
    z-index: 10; /* Ensures text is always clickable and on top of flowers */
    text-align: center;
}

/* 3. Base Decoration Styles */
.decor {
    position: absolute; /* Pins them to the screen edges */
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center center;
    z-index: 1; /* Keeps them behind the text */
    
    /* This makes them responsive! Minimum 150px, scales up to 25% of the screen, Max 400px */
    width: clamp(150px, 25vw, 400px);
    height: clamp(150px, 25vw, 400px);
}

/* 4. Top Row */
.top-left { 
    top: -5%; /* Pulls it slightly off-screen for a natural cut */
    left: -5%; 
    background-image: url('https://github.com/kiranaananda/wcard/blob/main/left.png?raw=true');
    background-position:  70% 40%;
    background-size: 300%;
}

.top-center { 
    top: -2%; 
    left: 50%; 
    transform: translateX(-50%); /* Perfectly centers it horizontally */
    width: clamp(200px, 40vw, 600px); /* Centers usually need to be wider */
    height: clamp(100px, 15vw, 250px);
    background-image: url('https://github.com/kiranaananda/wcard/blob/main/middle.png?raw=true');
    background-size: 150%;
}

.top-right { 
    top: -5%; 
    right: -5%; 
    background-image: url('https://github.com/kiranaananda/wcard/blob/main/right.png?raw=true');
    transform: rotate(180deg);
    background-size: 200%;
    background-position:  60% 10%;
}

/* 5. Bottom Row */
.bottom-left { 
    bottom: -5%; 
    left: -5%; 
    background-image: url('https://github.com/kiranaananda/wcard/blob/main/right.png?raw=true');
    background-size: 200%;
    background-position:  60% 10%;
}

.bottom-center { 
    bottom: -2%; 
    left: 50%; 
    /* Centers horizontally and flips upside down */
    transform: translateX(-50%) rotate(180deg); 
    width: clamp(200px, 40vw, 600px);
    height: clamp(100px, 15vw, 250px);
    background-image: url('https://github.com/kiranaananda/wcard/blob/main/middle.png?raw=true');
    background-size: 150%;
}

.bottom-right { 
    bottom: -5%; 
    right: -5%; 
    background-image: url('https://github.com/kiranaananda/wcard/blob/main/left.png?raw=true');
    transform: rotate(180deg);
    background-position:  70% 40%;
    background-size: 300%;
}

        /* --- The Content Center --- */
        .content {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        /* Text Styling */
        #main-title { font-family: 'Allura', cursive; font-size: 5rem; margin: 0; }
        #date { font-family: 'Quicksand', sans-serif; font-size: 2rem; letter-spacing: 5px; }
        #guest-salutation { font-size: 1.8rem; margin-bottom: 10px; font-style: italic; }
        
        .gold-line {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 10px 0;
        }

        /* Mobile adjustment */
        @media (max-width: 600px) {
            .wrapper {
                grid-template-columns: 100px 1fr 100px;
                grid-template-rows: 100px 1fr 100px;
            }
            #main-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="decor top-left"></div>
    <div class="decor top-center"></div>
    <div class="decor top-right"></div>

    <div class="decor middle-left"></div>
    <main class="content">
        <div id="guest-salutation">Dear <span id="guest-name">Guest</span>,</div>
        <h1 id="main-title">Save The Date</h1>
        <p id="date">03.06.2026</p>
        <h2 style="font-family: 'Allura', cursive; font-size: 3rem;">Kirana & Andrzej</h2>
    </main>
    <div class="decor middle-right"></div>

    <div class="decor bottom-left"></div>
    <div class="decor bottom-center"></div>
    <div class="decor bottom-right"></div>
</div>

        <main class="content">
            <div id="guest-salutation">Dear <span id="guest-name">Guest</span>,</div>
            
            <div class="gold-line"></div>
            <h1 id="main-title">Save The Date</h1>
            <p id="date">03.06.2026</p>
            <div class="gold-line"></div>

        <p id="body-text">We warmly invite you to share in the celebration of our marriage. Your presence on this joyous occasion will mean the world to us.</p>
        
        <h1 id="couple-names">Kirana & Andrzej</h1>
            
            <h2 style="font-family: 'Allura', cursive; font-size: 3rem;">Kirana & Andrzej</h2>
        </main>
    </div>

    <script>
        // Extract name from URL path: /wcard/Maria
        const pathArray = window.location.pathname.split('/');
        // Get the last part of the path
        const nameFromPath = pathArray[pathArray.length - 1] || pathArray[pathArray.length - 2];

        if (nameFromPath && nameFromPath.toLowerCase() !== 'wcard' && nameFromPath !== 'index.html') {
            document.getElementById('guest-name').innerText = decodeURIComponent(nameFromPath);
        }
    </script>
</body>
</html>
