<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Save the Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Playball&display=swap" rel="stylesheet">
    
<style>

/* Ensure the body allows scrolling now */
body, html {
    overflow-y: auto; 
    overflow-x: hidden;
    scroll-behavior: smooth;
}

.page {
    position: relative;
    width: 100vw;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden; /* Keeps the massive flowers contained to their section */
}

/* The specific flowers that will grow */
.top-left {
    transform-origin: top left;
    z-index: 100; /* Stays above text during the transition */
}

.bottom-right {
    transform-origin: bottom right;
    z-index: 100;
}

/* The Second Page - Different Layout */
#second-page {
    background-color: #fdfaf6; /* Elegant Cream */
    color: #273144;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
    40% {transform: translateY(-10px);}
    60% {transform: translateY(-5px);}
}

@font-face {
    font-family: 'Malibu'; 
    src: url('malibu-slant.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

@font-face {
    font-family: 'Madelyn'; 
    src: url('Madelyn-Trial-Regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}
        
        /* 1. The Container */
        .wrapper {
            position: relative; 
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #273144;
        }

        /* 2. The Text Content Area */
        .content {
            position: relative;
            z-index: 10; 
            text-align: center;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3. Base Decoration Styles */
        .decor {
            position: absolute; 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
            z-index: 1; 
            width: clamp(150px, 25vw, 400px);
            height: clamp(150px, 25vw, 400px);
            pointer-events: none;
        }

        /* 4. Top Row */
        .top-left { 
            top: -5%; 
            left: -5%;
            width: clamp(200px, 35vw, 500px);
            height: clamp(200px, 35vw, 500px);
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/left.png?raw=true');
            background-position: 70% 70%;
            background-size: 300%;
        }

        .top-center { 
            top: -2%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: clamp(200px, 40vw, 600px); 
            height: clamp(100px, 15vw, 250px);
            background-image: url();
            background-size: 150%;
        }

        .top-right { 
            top: -5%; 
            right: -5%; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/right.png?raw=true');
            transform: rotate(180deg);
            background-size: 200%;
            background-position: 60% 10%;
        }

        /* 5. Bottom Row */
        .bottom-left { 
            bottom: -5%; 
            left: -5%;
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/right.png?raw=true');
            background-size: 200%;
            background-position: 60% 10%;
        }

        .bottom-center { 
            bottom: -2%; 
            left: 50%; 
            transform: translateX(-50%) rotate(180deg); 
            width: clamp(200px, 40vw, 600px);
            height: clamp(100px, 15vw, 250px);
            background-image: url();
            background-size: 150%;
        }

        .bottom-right { 
            bottom: -5%; 
            right: -5%;
            width: clamp(200px, 35vw, 500px);
            height: clamp(200px, 35vw, 500px);
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/left.png?raw=true');
            transform: rotate(180deg);
            background-position: 70% 70%;
            background-size: 300%;
        }

        /* --- Text Styling --- */
        #guest-salutation { font-family: 'Quicksand', sans-serif; font-size: clamp(1.2rem, 4vw, 1.8rem); margin-bottom: 10px; }
        #main-title { font-family: 'Malibu', cursive; font-size: clamp(3rem, 10vw, 4.5rem); margin: 0; }
        #date { font-family: 'Quicksand', sans-serif; font-size: clamp(1.5rem, 5vw, 2rem); letter-spacing: 5px; margin: 10px 0; }
        #body-text { font-size: clamp(0.9rem, 3vw, 1.2rem); max-width: 80%; line-height: 1.5; margin-bottom: 20px; }
        #couple-names { font-family: 'Madelyn', cursive; font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; }
        
        .gold-line {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 15px 0;
        }
    </style>
</head>
<body>
<section class="page" id="first-page">
    <div class="decor top-left"></div>
    <div class="decor top-right"></div>
    <div class="decor bottom-left"></div>
    <div class="decor bottom-right"></div>

    <main class="content">
        <div id="guest-salutation">Dear <span id="guest-name">Guest</span>,</div>
        <h1 id="main-title">Save The Date</h1>
        <p id="date">03.06.2026</p>
        <p id="couple-names">Kirana and Andrzej</p>
        <p style="margin-top: 50px; opacity: 0.6;">Scroll to Explore ↓</p>
    </main>
</section>

<section class="page" id="second-page">
    <main class="content">
        <h2 style="font-family: 'Malibu'; font-size: 3rem;">Our Journey</h2>
        <div class="gold-line"></div>
        <p>This is where your second page content begins...</p>
    </main>
</section>

<script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('n');
            if (name) {
                const formattedName = decodeURIComponent(name).replace(/[_-]/g, ' ');
                document.getElementById('guest-name').innerText = formattedName;
            }
        }
</script>

<script>
window.onscroll = function() {
    let scrollPos = window.scrollY;
    let windowHeight = window.innerHeight;
    
    // Progress is a decimal between 0 and 1
    let progress = Math.min(scrollPos / windowHeight, 1);

    const topLeft = document.querySelector('.top-left');
    const bottomRight = document.querySelector('.bottom-right');
    const firstPageContent = document.querySelector('#first-page .content');

    // GROWTH LOGIC
    // Starts at your current scale (3.5) and grows to 20 to cover the screen
    let scaleValue = 3.5 + (progress * 16.5); 
    
    // Apply to Top-Left (Original rotation was 0)
    topLeft.style.transform = `scale(${scaleValue})`;
    
    // Apply to Bottom-Right (Original rotation was 180deg)
    bottomRight.style.transform = `scale(${scaleValue}) rotate(180deg)`;

    // FADE LOGIC
    // Fades the text out as the flowers move in
    firstPageContent.style.opacity = 1 - (progress * 1.5);
    
    // Optional: Slight blur effect as it disappears
    firstPageContent.style.filter = `blur(${progress * 10}px)`;
};
</script>
    
</body>
</html>
