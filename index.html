<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Crimson+Text&family=Quicksand:wght@300&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #273144;
            overflow: hidden;
            color: white;
            font-family: 'Crimson Text', serif;
        }

        /* The 3x3 Grid */
        .wrapper {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 300px 1fr 300px;
            height: 100vh;
            width: 100vw;
        }

        /* --- Corner & Edge Elements --- */
        .decor {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
        }

        .top-left { 
            grid-column: 1; grid-row: 1; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/left.png?raw=true');
            background-position:  70% 70%;
            background-size: 140%;
            transform: scale(3.5);
        }
        .top-center { 
            grid-column: 2; grid-row: 1; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/middle.png?raw=true');
            background-position: 50% 50%;
            transform: scale(1.5);
        }
        .top-right { 
            grid-column: 3; grid-row: 1; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/right.png?raw=true');
            background-position:  40% 800%;
            background-size: 140%;
            transform: scale(1.8) rotate(180deg);
        }
         .bottom-left { 
            grid-column: 1; grid-row: 1; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/right.png?raw=true');
            background-position:  40% 800%;
            background-size: 140%;
            transform: scale(1.8);
        }
        .bottom-center { 
            grid-column: 2; grid-row: 3; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/middle.png?raw=true');
            background-position: 50% 50%;
            transform: scale(1.5) rotate(180deg);
        }

        .bottom-right { 
            grid-column: 3; grid-row: 3; 
            background-image: url('https://github.com/kiranaananda/wcard/blob/main/left.png?raw=true');
            background-position:  70% 70%;
            background-size: 140%;
            transform: scale(3.5) rotate(180deg);
        }

        /* --- The Content Center --- */
        .content {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        /* Text Styling */
        #main-title { font-family: 'Allura', cursive; font-size: 5rem; margin: 0; }
        #date { font-family: 'Quicksand', sans-serif; font-size: 2rem; letter-spacing: 5px; }
        #guest-salutation { font-size: 1.8rem; margin-bottom: 10px; font-style: italic; }
        
        .gold-line {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 10px 0;
        }

        /* Mobile adjustment */
        @media (max-width: 600px) {
            .wrapper {
                grid-template-columns: 100px 1fr 100px;
                grid-template-rows: 100px 1fr 100px;
            }
            #main-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="decor top-left"></div>
    <div class="decor top-center"></div>
    <div class="decor top-right"></div>

    <div class="decor middle-left"></div>
    <main class="content">
        <div id="guest-salutation">Dear <span id="guest-name">Guest</span>,</div>
        <h1 id="main-title">Save The Date</h1>
        <p id="date">03.06.2026</p>
        <h2 style="font-family: 'Allura', cursive; font-size: 3rem;">Kirana & Andrzej</h2>
    </main>
    <div class="decor middle-right"></div>

    <div class="decor bottom-left"></div>
    <div class="decor bottom-center"></div>
    <div class="decor bottom-right"></div>
</div>

        <main class="content">
            <div id="guest-salutation">Dear <span id="guest-name">Guest</span>,</div>
            
            <div class="gold-line"></div>
            <h1 id="main-title">Save The Date</h1>
            <p id="date">03.06.2026</p>
            <div class="gold-line"></div>

        <p id="body-text">We warmly invite you to share in the celebration of our marriage. Your presence on this joyous occasion will mean the world to us.</p>
        
        <h1 id="couple-names">Kirana & Andrzej</h1>
            
            <h2 style="font-family: 'Allura', cursive; font-size: 3rem;">Kirana & Andrzej</h2>
        </main>
    </div>

    <script>
        // Extract name from URL path: /wcard/Maria
        const pathArray = window.location.pathname.split('/');
        // Get the last part of the path
        const nameFromPath = pathArray[pathArray.length - 1] || pathArray[pathArray.length - 2];

        if (nameFromPath && nameFromPath.toLowerCase() !== 'wcard' && nameFromPath !== 'index.html') {
            document.getElementById('guest-name').innerText = decodeURIComponent(nameFromPath);
        }
    </script>
</body>
</html>
